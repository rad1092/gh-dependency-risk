name: dep-risk-manual

on:
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number or full PR URL"
        required: true
        type: string
      repo:
        description: "Optional repository override (OWNER/REPO)"
        required: false
        type: string
      lang:
        description: "Output language"
        required: false
        default: en
        type: choice
        options:
          - ko
          - en
      fail_level:
        description: "Fail threshold"
        required: false
        default: none
        type: choice
        options:
          - none
          - low
          - medium
          - high
          - critical
      comment:
        description: "Upsert a PR timeline comment"
        required: false
        default: false
        type: boolean
      no_registry:
        description: "Skip npm registry lookups"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  dep-risk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Set build metadata
        shell: bash
        run: |
          echo "BUILD_VERSION=manual-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "BUILD_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build gh-dep-risk
        shell: bash
        run: >
          go build
          -ldflags "-s -w -X gh-dep-risk/cmd.version=${BUILD_VERSION} -X gh-dep-risk/cmd.commit=${BUILD_COMMIT} -X gh-dep-risk/cmd.date=${BUILD_DATE}"
          -o gh-dep-risk
          .

      - name: Run gh-dep-risk
        id: dep_risk
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PR: ${{ inputs.pr }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_LANG: ${{ inputs.lang }}
          INPUT_FAIL_LEVEL: ${{ inputs.fail_level }}
          INPUT_COMMENT: ${{ inputs.comment }}
          INPUT_NO_REGISTRY: ${{ inputs.no_registry }}
          DEFAULT_REPO: ${{ github.repository }}
        run: |
          set +e

          if [[ -n "$INPUT_REPO" ]]; then
            export GH_REPO="$INPUT_REPO"
          else
            export GH_REPO="$DEFAULT_REPO"
          fi

          bundle_dir="$RUNNER_TEMP/dep-risk-bundle"
          rm -rf "$bundle_dir"
          echo "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"

          if [[ "$INPUT_COMMENT" == 'true' && "$GH_REPO" != "$DEFAULT_REPO" ]]; then
            echo "::error::comment mode is limited to PRs in $DEFAULT_REPO when using this workflow. Run the target repository's own comment-smoke workflow for remote comment-upsert verification."
            echo "exit_code=4" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          args=(
            pr
            "$INPUT_PR"
            --lang "$INPUT_LANG"
            --fail-level "$INPUT_FAIL_LEVEL"
            --bundle-dir "$bundle_dir"
          )

          if [[ "$INPUT_COMMENT" == 'true' ]]; then
            args+=(--comment)
          fi

          if [[ "$INPUT_NO_REGISTRY" == 'true' ]]; then
            args+=(--no-registry)
          fi

          ./gh-dep-risk "${args[@]}"
          exit_code=$?

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Append markdown summary
        if: always()
        shell: bash
        run: |
          bundle_dir='${{ steps.dep_risk.outputs.bundle_dir }}'
          if [[ -f "$bundle_dir/dep-risk.md" ]]; then
            cat "$bundle_dir/dep-risk.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "gh-dep-risk did not produce a markdown bundle." >> "$GITHUB_STEP_SUMMARY"
            echo "CLI exit code: ${{ steps.dep_risk.outputs.exit_code }}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload dep-risk bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dep-risk-bundle
          path: ${{ steps.dep_risk.outputs.bundle_dir }}
          if-no-files-found: warn

      - name: Surface dep-risk exit code
        if: always() && steps.dep_risk.outputs.exit_code != '' && steps.dep_risk.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "gh-dep-risk exited with code ${{ steps.dep_risk.outputs.exit_code }}" >&2
          exit "${{ steps.dep_risk.outputs.exit_code }}"
